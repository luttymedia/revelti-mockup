<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelti Navigation Bar (Public)</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        revelti: {
                            blue: '#213c63',
                            orange: '#f58220',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">

    <nav id="main-nav" class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-sm z-50 transition-transform duration-300">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-12">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <a href="homePage.html">
                        <img class="h-5" src="images/reveltiLogo.png" alt="Revelti Logo">
                    </a>
                </div>

                <!-- Search Bar (hidden by default, positioned absolutely) -->
                <div id="search-container"
                    class="absolute right-0 sm:left-1/2 sm:-translate-x-1/2 md:left-auto md:translate-x-0 md:relative flex-grow flex justify-end items-center">
                    <input id="search-bar" type="text" placeholder="Search events, artists, creators..."
                        class="w-0 md:w-full max-w-xs py-1 p-2 border rounded-full focus:outline-none focus:ring-2 focus:ring-orange-500 opacity-0 md:opacity-100 transition-all duration-300 ease-in-out text-sm font-medium">
                </div>

                <!-- Icons -->
                <div class="flex items-center space-x-0">
                    <!-- Search Icon -->
                    <button id="search-icon" class="p-1.5 rounded-full hover:bg-gray-200">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </button>
                    <!-- Notification Icon (Removed for Public) -->
                    <!-- Hamburger Icon -->
                    <button id="hamburger-icon" class="p-1.5 rounded-full hover:bg-gray-200">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Menu (Public) -->
        <div id="mobile-menu"
            class="hidden max-w-2xl md:max-w-full lg:max-w-full mx-auto px-4 pt-2 pb-4 space-y-2 bg-white border-t border-gray-200 shadow-lg">
            <div class="flex items-center justify-end space-x-2 px-2 py-1">
                <span id="lang-en" class="font-bold text-orange-500 cursor-pointer">EN</span>
                <span>|</span>
                <span id="lang-es" class="font-bold text-gray-700 cursor-pointer">ES</span>
            </div>
            <a href="eventListings.html"
                class="flex items-center justify-end space-x-2 px-2 py-1 text-gray-700 font-semibold hover:bg-gray-100 rounded-md">
                <span>Events</span>
            </a>
            <a href="#"
                class="flex items-center justify-end space-x-2 px-2 py-1 text-gray-700 font-semibold hover:bg-gray-100 rounded-md">
                <span>Contact</span>
            </a>
            <div class="border-t border-gray-200 !my-2"></div>
            <a href="attendeeDashboard.html" class="flex items-center justify-end px-2 py-2 mt-2">
                <span
                    class="bg-revelti-orange text-white font-bold py-1.5 px-6 rounded-full shadow-sm hover:bg-orange-600 transition-colors">Login
                    / Sign up</span>
            </a>
            <div id="app-version" class="text-xs text-gray-400 text-right pr-2 mt-4">v1.0.4</div>
        </div>
    </nav>
</body>

</html>
