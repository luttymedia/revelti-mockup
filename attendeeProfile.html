<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelti - Attendee Profile</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        revelti: {
                            blue: '#213c63',
                            orange: '#f58220',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="antialiased text-gray-800 bg-gray-50">
    <div id="navbar-placeholder"></div>

    <div class="max-w-lg mx-auto px-4 py-8">

        <!-- Back navigation -->
        <a href="eventDetail.html" class="inline-flex items-center gap-1.5 text-sm font-semibold text-gray-500 hover:text-revelti-blue transition-colors mb-6">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
            Back to event
        </a>

        <!-- Profile card -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center">
            <img src="https://i.pravatar.cc/120?img=10" alt="Attendee avatar"
                class="w-24 h-24 rounded-full object-cover mx-auto shadow-md mb-4">
            <h1 class="text-2xl font-bold revelti-blue">Sofia Martínez</h1>
            <p class="text-sm text-gray-500 mt-1">Madrid, Spain</p>

            <div class="mt-4 flex justify-center gap-2">
                <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-blue-50 border border-blue-200 rounded-full text-xs font-bold text-revelti-blue">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    Going
                </span>
            </div>

            <p class="mt-5 text-gray-600 text-sm leading-relaxed">
                Passionate bachata dancer based in Madrid. Attending dance festivals across Europe since 2018.
            </p>
        </div>

        <!-- Placeholder section -->
        <div class="mt-4 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
            <h2 class="font-bold text-lg revelti-blue mb-3">Events in common</h2>
            <div class="flex items-center gap-3 p-2 rounded-lg bg-gray-50">
                <img src="images/eventPoster.png" alt="Dance Fest Spain 2026"
                    class="w-12 h-12 rounded-lg object-cover flex-shrink-0"
                    onerror="this.onerror=null;this.src='https://placehold.co/48x48/f58220/ffffff?text=DFS';">
                <div>
                    <p class="text-sm font-semibold text-gray-800">Dance Fest Spain 2026</p>
                    <p class="text-xs text-gray-500">Oct 08–12, 2026 &bull; Madrid</p>
                </div>
            </div>
        </div>

    </div>

    <script src="main.js" defer></script>
    <div id="footer-placeholder"></div>
</body>

</html>
