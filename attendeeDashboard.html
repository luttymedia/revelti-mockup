<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelti - My Dashboard</title>

    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        revelti: {
                            blue: '#213c63',
                            orange: '#f58220',
                        }
                    }
                }
            }
        }
    </script>


    <!-- Google Fonts: Nunito -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="antialiased text-gray-800 bg-white">
    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Main container with a max-width for larger screens -->
    <div class="max-w-2xl md:max-w-full lg:max-w-full mx-auto bg-white overflow-hidden">

        <!-- Header Section -->
        <header class="px-4 py-1 flex items-center">
            <img src="images/attendeeAvatar.png" alt="User Avatar"
                class="w-20 h-20 rounded-full object-cover shadow-md">
            <div class="ml-4">
                <h1 class="text-3xl font-bold revelti-blue">Alex Johnson</h1>
                <p class="text-gray-500">Attendee Dashboard</p>
            </div>
        </header>

        <!-- Recent Activity Section -->
        <div class="px-4 pb-4">
            <h2 class="text-lg font-bold text-revelti-blue mb-4">Recent Activity</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

                <!-- Card 1: Gallery -->
                <div class="flex items-center gap-3 p-3 bg-purple-50 rounded-xl border border-purple-100 cursor-pointer hover:bg-purple-100 transition"
                    onclick="window.openGalleryOverlay()">
                    <div
                        class="w-10 h-10 rounded-lg bg-white flex items-center justify-center flex-shrink-0 shadow-sm text-lg">
                        📸
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-gray-800 leading-tight">New gallery from <b>Dance Fest
                                Spain</b></p>
                    </div>
                </div>

                <!-- Card 2: Ticket -->
                <a href="purchaseDetails.html"
                    class="flex items-center gap-3 p-3 bg-green-50 rounded-xl border border-green-100 hover:bg-green-100 transition">
                    <div
                        class="w-10 h-10 rounded-lg bg-white flex items-center justify-center flex-shrink-0 shadow-sm text-lg">
                        🎟️
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-gray-800 leading-tight">Ticket confirmed for <b>Dance Fest
                                Spain 2026</b></p>
                    </div>
                </a>

                <!-- Card 3: Price Increase Warning -->
                <a href="ticketPurchase.html"
                    class="flex items-center gap-3 p-3 bg-amber-50 rounded-xl border border-amber-100 hover:bg-amber-100 transition">
                    <div
                        class="w-10 h-10 rounded-lg bg-white flex items-center justify-center flex-shrink-0 shadow-sm text-lg">
                        📈
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-gray-800 leading-tight">Ticket prices for <b>Dance Fest
                                Spain 2026</b> going up soon</p>
                    </div>
                </a>

                <!-- Card 4: New Event Edition -->
                <a href="#"
                    class="flex items-center gap-3 p-3 bg-teal-50 rounded-xl border border-teal-100 hover:bg-teal-100 transition">
                    <div
                        class="w-10 h-10 rounded-lg bg-white flex items-center justify-center flex-shrink-0 shadow-sm text-lg">
                        🎉
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-gray-800 leading-tight">New edition of <b>Weekly Latin
                                Sundays</b> is now live</p>
                    </div>
                </a>

            </div>
        </div>

        <!-- Mobile-only: Following section loads inline (no tabs on mobile) -->
        <div id="mobile-following-section" class="md:hidden">
            <header class="sticky top-0 bg-white z-10 px-4 py-1">
                <h1 class="text-2xl font-bold revelti-blue">Following</h1>
                <p class="text-gray-500">Keep up-to-date with your favorites.</p>
            </header>
            <div id="mobile-following" class="space-y-4 p-4">
                <!-- Content will be loaded dynamically -->
            </div>
        </div>

        <!-- Tab Navigation (desktop only) -->
        <nav class="hidden md:block py-1">
            <div class="attendee-tab-container-wide">
                <button data-tab-id="following"
                    class="tab-button flex-1 px-3 py-2 text-center text-gray-500 hover:bg-gray-200 rounded-full transition-all duration-200 text-sm font-medium attendee-tab-active">Following</button>
                <button data-tab-id="media"
                    class="tab-button flex-1 px-3 py-2 text-center text-gray-500 hover:bg-gray-200 rounded-full transition-all duration-200 text-sm font-medium">Media</button>
                <button data-tab-id="tickets"
                    class="tab-button flex-1 px-3 py-2 text-center text-gray-500 hover:bg-gray-200 rounded-full transition-all duration-200 text-sm font-medium">My
                    Tickets</button>
                <button data-tab-id="profile"
                    class="tab-button flex-1 px-3 py-2 text-center text-gray-500 hover:bg-gray-200 rounded-full transition-all duration-200 text-sm font-medium">Profile</button>
            </div>
        </nav>

        <!-- Main Content Sections (Tabs) - desktop only -->
        <main class="hidden md:block px-4 py-4 bg-white">
            <!-- Following Tab Content -->
            <div id="following" class="tab-content space-y-6">
                <!-- Content will be loaded dynamically -->
            </div>

            <!-- Media Tab Content -->
            <div id="media" class="tab-content hidden space-y-6">
                <!-- Content will be loaded dynamically -->
            </div>

            <!-- My Tickets Tab Content -->
            <div id="tickets" class="tab-content hidden space-y-6">
                <!-- Content will be loaded dynamically -->
            </div>

            <!-- Profile Tab Content -->
            <div id="profile" class="tab-content hidden space-y-4">
                <!-- Content will be loaded dynamically -->
            </div>
        </main>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Main Script Block for Tab & Content Management -->
    <script>
        // A map to link tab IDs to their corresponding HTML file names.
        const tabContentMap = {
            'following': 'followingTab.html',
            'media': 'mediaTab.html',
            'tickets': 'ticketsTab.html',
            'profile': 'profileTab.html'
        };

        // This function fetches and injects content for a specific tab.
        async function loadTabContent(tabId) {
            const container = document.getElementById(tabId);
            const fileName = tabContentMap[tabId];

            // Remove any dynamically added modals from previous tab loads
            const existingMediaModal = document.getElementById('media-modal');
            if (existingMediaModal) existingMediaModal.remove();
            const existingStylesModal = document.getElementById('styles-modal');
            if (existingStylesModal) existingStylesModal.remove();

            if (!container || !fileName) {
                console.error(`Invalid tab ID or file name for: ${tabId}`);
                return;
            }

            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error(`Failed to load ${fileName}: ${response.statusText}`);

                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');

                const tabContent = doc.getElementById(tabId);

                if (tabContent) {
                    // Clear existing content and inject the new HTML
                    container.innerHTML = tabContent.innerHTML;

                    // Find and inject modals from the fetched content.
                    const mediaModal = doc.getElementById('media-modal');
                    if (mediaModal) document.body.appendChild(mediaModal);

                    const stylesModal = doc.getElementById('styles-modal');
                    if (stylesModal) document.body.appendChild(stylesModal);

                    // Initialize tab-specific functionality
                    if (tabId === 'profile') {
                        // Both of these functions are needed for the profile page
                        updateSelectedStylesDisplay();
                        initializeMediaTabListeners();
                    } else if (tabId === 'media') {
                        initializeMediaTabListeners();
                    }
                } else {
                    container.innerHTML = `<p>Error: Could not find content with ID "${tabId}" in ${fileName}.</p>`;
                }
            } catch (error) {
                console.error(`Error fetching tab content for ${tabId}:`, error);
                container.innerHTML = `<p>Could not load the content. Please try again later.</p>`;
            }
        }

        // Main function to handle switching between tabs.
        function switchTab(tabId) {
            // Hide all tab content sections.
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.add('hidden');
            });

            // Deactivate all tab navigation links.
            document.querySelectorAll('.tab-button').forEach(button => {
                button.classList.remove('attendee-tab-active');
            });

            // Show the selected tab content.
            const selectedTabContent = document.getElementById(tabId);
            if (selectedTabContent) selectedTabContent.classList.remove('hidden');

            // Activate the selected tab navigation link.
            const selectedTabButton = document.querySelector(`[data-tab-id="${tabId}"]`);
            if (selectedTabButton) selectedTabButton.classList.add('attendee-tab-active');

            // Load the content for the selected tab.
            loadTabContent(tabId);
        }

        // Load the Following tab content into the mobile inline section.
        async function loadMobileFollowing() {
            const container = document.getElementById('mobile-following');
            if (!container) return;
            try {
                const response = await fetch('followingTab.html');
                if (!response.ok) throw new Error(`Failed to load followingTab.html: ${response.statusText}`);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const tabContent = doc.getElementById('following');
                if (tabContent) {
                    container.innerHTML = tabContent.innerHTML;
                }
            } catch (error) {
                console.error('Error loading mobile Following content:', error);
            }
        }

        // Event listener to set up the tab navigation when the page is fully loaded.
        document.addEventListener('DOMContentLoaded', () => {
            const tabButtons = document.querySelectorAll('.tab-button');
            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabId = button.getAttribute('data-tab-id');
                    if (tabId) switchTab(tabId);
                });
            });
            // Load the default tab on initial page load (for desktop)
            switchTab('following');
            // Load Following content inline for mobile
            loadMobileFollowing();
        });
    </script>

    <script src="js/galleryOverlay.js"></script>
    <!-- External JavaScript for all global functions and modals -->
    <script src="main.js" defer></script>
</body>

</html>
