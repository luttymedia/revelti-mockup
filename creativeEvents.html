<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelti - Your Events</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        revelti: {
                            blue: '#213c63',
                            orange: '#f58220',
                            purple: '#6b21a8'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="dashboard-layout bg-gray-100 antialiased text-gray-800" data-role="creative">
    <div id="creative-navbar-placeholder"></div>

    <div class="dashboard-main-area">
        <aside id="sidebar-placeholder" class="sidebar-container bg-white z-20"></aside>

        <div class="main-wrapper">
            <main class="page-content">
                <div class="max-w-full mx-auto px-4 sm:px-4 lg:px-6 py-4">

                    <!-- Header Section -->
                    <header class="mb-6">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
                            <div>
                                <h1 class="text-3xl font-extrabold text-revelti-blue">Your Events</h1>
                                <p class="text-gray-600">Track your media contribution and delivery status across events
                                </p>
                            </div>
                        </div>

                        <!-- Controls Bar -->
                        <div
                            class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                            <!-- Search -->
                            <div class="relative flex-1 max-w-lg">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                    </svg>
                                </div>
                                <input type="text" id="event-search"
                                    placeholder="Search events by name, organizer, or location"
                                    class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:placeholder-gray-400 focus:ring-1 focus:ring-revelti-blue focus:border-revelti-blue sm:text-sm transition duration-150 ease-in-out">
                            </div>

                            <div
                                class="flex flex-col sm:flex-row gap-4 items-center overflow-x-auto pb-2 sm:pb-0 hide-scrollbar w-full lg:w-auto">
                                <!-- Filters -->
                                <div class="flex bg-gray-100 p-1 rounded-lg flex-shrink-0">
                                    <button
                                        class="filter-btn active-filter px-4 py-1.5 rounded-md text-sm font-medium bg-white text-revelti-blue shadow-sm"
                                        data-filter="all">All</button>
                                    <button
                                        class="filter-btn px-4 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900"
                                        data-filter="Active">Active</button>
                                    <button
                                        class="filter-btn px-4 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900"
                                        data-filter="Upcoming">Upcoming</button>
                                    <button
                                        class="filter-btn px-4 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900"
                                        data-filter="Completed">Completed</button>
                                    <button
                                        class="filter-btn px-4 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900"
                                        data-filter="Pending">Pending</button>
                                </div>

                                <!-- Sorting Button -->
                                <button onclick="openSortModal()"
                                    class="flex items-center gap-2 px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-sm font-semibold text-gray-700 hover:bg-gray-50 transition shadow-sm flex-shrink-0">
                                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path>
                                    </svg>
                                    Sort
                                </button>
                            </div>
                        </div>
                    </header>

                    <!-- Events Container -->
                    <div id="events-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <!-- Views injected by JS -->
                    </div>

                    <!-- Empty State -->
                    <div id="empty-state"
                        class="hidden bg-white rounded-xl border border-gray-200 p-12 text-center shadow-sm mt-8">
                        <div
                            class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-gray-100">
                            <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                                </path>
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold text-gray-700 mb-2">No events found</h3>
                        <p class="text-gray-500 max-w-md mx-auto mb-6">We couldn't find any events matching your current
                            filters or search query.</p>
                        <button
                            class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-2 px-6 rounded-lg transition-colors"
                            onclick="document.getElementById('event-search').value=''; currentFilter='all'; renderEvents();">Clear
                            Search & Filters</button>
                    </div>

                </div>
            </main>
        </div>
    </div>

    <!-- Sorting Modal -->
    <div id="modal-sorting"
        class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 hidden flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-bold text-gray-800 text-lg">Sort Events</h3>
                <button onclick="closeSortModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="radio" name="sort-option" value="recent"
                        class="text-revelti-blue focus:ring-revelti-blue h-4 w-4">
                    <span class="text-sm text-gray-700 font-medium">Most Recent</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="radio" name="sort-option" value="date_upcoming"
                        class="text-revelti-blue focus:ring-revelti-blue h-4 w-4">
                    <span class="text-sm text-gray-700 font-medium">Event Date (Upcoming first)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="radio" name="sort-option" value="date_past"
                        class="text-revelti-blue focus:ring-revelti-blue h-4 w-4">
                    <span class="text-sm text-gray-700 font-medium">Event Date (Past first)</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="radio" name="sort-option" value="assets_desc"
                        class="text-revelti-blue focus:ring-revelti-blue h-4 w-4">
                    <span class="text-sm text-gray-700 font-medium">Most Assets</span>
                </label>
                <label class="flex items-center space-x-3 cursor-pointer">
                    <input type="radio" name="sort-option" value="galleries_desc"
                        class="text-revelti-blue focus:ring-revelti-blue h-4 w-4">
                    <span class="text-sm text-gray-700 font-medium">Most Galleries</span>
                </label>
            </div>
            <div class="px-6 py-4 bg-gray-50 flex justify-end">
                <button onclick="applySort()"
                    class="px-4 py-2 bg-revelti-blue text-white rounded-lg text-sm font-bold hover:bg-blue-800 transition">Apply
                    Sort</button>
            </div>
        </div>
    </div>

    <!-- Script for Mock Data and View/Filter Logic -->
    <script>
        const eventsData = [
            {
                id: 1,
                name: "Bachata Geneva Festival 2026",
                organizer: "The Festival of Nations",
                status: "Active",
                statusClass: "bg-green-100 text-green-800",
                date: "Oct 08 - 12, 2026",
                dateRaw: "2026-10-08",
                location: "Geneva, CH",
                image: "images/eventPoster.png",
                imageFallback: "https://placehold.co/600x400/213c63/ffffff?text=BGF+2026",
                assetsCount: 1342,
                galleriesCount: 24,
                delivery: {
                    published: 850,
                    scheduled: 200,
                    draft: 292
                },
                addedDate: "2026-03-01"
            },
            {
                id: 2,
                name: "Paris Kizomba Congress 2026",
                organizer: "Kizomba France Team",
                status: "Active",
                statusClass: "bg-green-100 text-green-800",
                date: "Nov 20 - 24, 2026",
                dateRaw: "2026-11-20",
                location: "Paris, FR",
                image: "https://placehold.co/600x400/9333ea/ffffff?text=PKC+2026",
                assetsCount: 450,
                galleriesCount: 8,
                delivery: {
                    published: 100,
                    scheduled: 50,
                    draft: 300
                },
                addedDate: "2026-03-10"
            },
            {
                id: 3,
                name: "London Salsa Spring Break",
                organizer: "UK Dance Events",
                status: "Upcoming",
                statusClass: "bg-orange-100 text-orange-800",
                date: "Apr 10 - 14, 2027",
                dateRaw: "2027-04-10",
                location: "London, UK",
                image: "https://placehold.co/600x400/f58220/ffffff?text=London+Salsa",
                assetsCount: 0,
                galleriesCount: 0,
                delivery: {
                    published: 0,
                    scheduled: 0,
                    draft: 0
                },
                addedDate: "2026-03-15"
            },
            {
                id: 4,
                name: "Barcelona Summer Fest 2026",
                organizer: "BCN Dance",
                status: "Completed",
                statusClass: "bg-gray-200 text-gray-700",
                date: "Jul 15 - 19, 2026",
                dateRaw: "2026-07-15",
                location: "Barcelona, ES",
                image: "https://placehold.co/600x400/64748b/ffffff?text=BCN+Fest",
                assetsCount: 2100,
                galleriesCount: 45,
                delivery: {
                    published: 2100,
                    scheduled: 0,
                    draft: 0
                },
                addedDate: "2025-12-01"
            },
            {
                id: 5,
                name: "Madrid Sensual Week",
                organizer: "Sensual Dance Spain",
                status: "Pending",
                statusClass: "bg-yellow-100 text-yellow-800",
                date: "Aug 05 - 10, 2026",
                dateRaw: "2026-08-05",
                location: "Madrid, ES",
                image: "https://placehold.co/600x400/eab308/ffffff?text=Madrid+Week",
                assetsCount: 0,
                galleriesCount: 0,
                delivery: {
                    published: 0,
                    scheduled: 0,
                    draft: 0
                },
                addedDate: "2026-03-16"
            }
        ];

        let currentFilter = 'all'; // 'all' | 'Active' | 'Upcoming' | 'Completed' | 'Pending'
        let currentSort = 'recent'; // 'recent', 'date_upcoming', 'date_past', 'assets_desc', 'galleries_desc'

        function openSortModal() {
            document.getElementById('modal-sorting').classList.remove('hidden');
            const radio = document.querySelector(`input[name="sort-option"][value="${currentSort}"]`);
            if (radio) radio.checked = true;
        }

        function closeSortModal() {
            document.getElementById('modal-sorting').classList.add('hidden');
        }

        function applySort() {
            const selected = document.querySelector('input[name="sort-option"]:checked');
            if (selected) {
                currentSort = selected.value;
                renderEvents();
            }
            closeSortModal();
        }

        function sortData(data) {
            return [...data].sort((a, b) => {
                if (currentSort === 'recent') return new Date(b.addedDate) - new Date(a.addedDate);
                if (currentSort === 'date_upcoming') return new Date(a.dateRaw) - new Date(b.dateRaw);
                if (currentSort === 'date_past') return new Date(b.dateRaw) - new Date(a.dateRaw);
                if (currentSort === 'assets_desc') return b.assetsCount - a.assetsCount;
                if (currentSort === 'galleries_desc') return b.galleriesCount - a.galleriesCount;
                return 0;
            });
        }

        function renderEvents() {
            const container = document.getElementById('events-container');
            const emptyState = document.getElementById('empty-state');
            const searchInput = document.getElementById('event-search').value.toLowerCase();

            container.innerHTML = '';
            let hasVisible = false;

            const sortedData = sortData(eventsData);

            sortedData.forEach(event => {
                // Apply filters
                const matchesFilter = currentFilter === 'all' || event.status === currentFilter;

                // Enhanced Search: name, organizer, location
                const searchableText = `${event.name} ${event.organizer} ${event.location}`.toLowerCase();
                const matchesSearch = searchableText.includes(searchInput);

                if (matchesFilter && matchesSearch) {
                    hasVisible = true;

                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow duration-200 border border-gray-100 flex flex-col overflow-hidden';

                    card.innerHTML = `
                        <!-- Card Header -->
                        <div class="relative h-32 overflow-hidden bg-gray-100 flex-shrink-0">
                            <img src="${event.image}" alt="${event.name}" class="w-full h-full object-cover" onerror="this.onerror=null;this.src='${event.imageFallback}';">
                            <div class="absolute top-3 right-3">
                                <span class="${event.statusClass} text-xs font-bold px-3 py-1 rounded-full shadow-sm uppercase tracking-wide">${event.status}</span>
                            </div>
                        </div>

                        <!-- Card Body -->
                        <div class="p-5 flex-1 flex flex-col">
                            
                            <!-- Main Info -->
                            <div class="mb-4">
                                <h2 class="text-lg font-bold text-revelti-blue leading-tight mb-1" title="${event.name}">${event.name}</h2>
                                <p class="text-sm font-semibold text-gray-500 mb-1" title="${event.organizer}">${event.organizer}</p>
                                <p class="text-xs text-gray-400">${event.date} &bull; ${event.location}</p>
                            </div>

                            <!-- Contribution Summary -->
                            <div class="bg-gray-50 rounded-lg p-3 border border-gray-100 mb-4 grid grid-cols-2 gap-2 text-center text-sm">
                                <div>
                                    <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-0.5">Assets</p>
                                    <p class="font-bold text-gray-800">${event.assetsCount.toLocaleString()}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-gray-400 font-medium uppercase tracking-wider mb-0.5">Galleries</p>
                                    <p class="font-bold text-gray-800">${event.galleriesCount.toLocaleString()}</p>
                                </div>
                            </div>

                            <!-- Delivery Status -->
                            <div class="mb-5 mt-auto">
                                <div class="flex items-center justify-between mb-2">
                                    <p class="text-xs font-bold text-gray-700 uppercase tracking-widest">Delivery Status</p>
                                    <div class="flex items-center relative group inline-flex">
                                        <svg class="w-4 h-4 text-gray-400 cursor-help hover:text-revelti-orange transition" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                        </svg>
                                        <div class="absolute right-0 bottom-full mb-2 hidden group-hover:block w-48 p-2 bg-gray-800 text-xs text-white rounded-md shadow-lg z-50 text-center">
                                            Shows the status of your media delivery based on linked folders
                                            <div class="absolute right-4 top-full w-2 h-2 bg-gray-800 transform rotate-45 -mt-1"></div>
                                        </div>
                                    </div>
                                </div>
                                <ul class="text-sm text-gray-600 space-y-1.5 font-medium">
                                    <li class="flex items-center"><span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-2"></span> ${event.delivery.published.toLocaleString()} Published</li>
                                    <li class="flex items-center"><span class="w-1.5 h-1.5 rounded-full bg-blue-500 mr-2"></span> ${event.delivery.scheduled.toLocaleString()} Scheduled</li>
                                    <li class="flex items-center"><span class="w-1.5 h-1.5 rounded-full bg-gray-400 mr-2"></span> ${event.delivery.draft.toLocaleString()} Draft</li>
                                </ul>
                            </div>

                            <!-- Action Button -->
                            ${event.id === 1 ? `
                                <a href="creativeEventView.html?id=${event.id}" class="block w-full text-center bg-gray-50 hover:bg-revelti-blue hover:text-white text-revelti-blue border border-gray-200 hover:border-revelti-blue font-bold py-2 rounded-lg transition duration-200 shadow-sm mt-auto">
                                    View Event
                                </a>
                            ` : `
                                <button disabled class="block w-full text-center bg-gray-50 text-gray-400 font-bold py-2 rounded-lg cursor-not-allowed border border-gray-200 mt-auto">
                                    View Event (Preview)
                                </button>
                            `}
                        </div>
                    `;
                    container.appendChild(card);
                }
            });

            if (!hasVisible) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                container.classList.remove('hidden');
                emptyState.classList.add('hidden');
            }
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', () => {
            renderEvents();

            // Search
            const searchInput = document.getElementById('event-search');
            searchInput.addEventListener('input', () => {
                renderEvents();
            });

            // Filters
            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // Update active class
                    filterBtns.forEach(b => {
                        b.classList.remove('active-filter', 'bg-white', 'text-revelti-blue', 'shadow-sm');
                        b.classList.add('text-gray-600', 'hover:text-gray-900');
                    });

                    e.target.classList.add('active-filter', 'bg-white', 'text-revelti-blue', 'shadow-sm');
                    e.target.classList.remove('text-gray-600', 'hover:text-gray-900');

                    currentFilter = e.target.getAttribute('data-filter');
                    renderEvents();
                });
            });
        });
    </script>
    <script src="layout-injector.js" defer></script>
    <script src="creative.js" defer></script>
</body>

</html>
