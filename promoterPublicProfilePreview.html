<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revelti - Promoter Portfolio Preview</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        revelti: {
                            blue: '#213c63',
                            orange: '#f58220',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
    </style>
</head>

<body class="antialiased text-gray-800 lg:bg-gray-50">
    <div class="max-w-2xl md:max-w-full lg:max-w-full mx-auto">
        <div class="bg-white overflow-hidden lg:grid lg:grid-cols-3 lg:gap-8">
            <!-- Left Column: Promoter Information -->
            <div class="lg:col-span-1 border-r border-gray-100 min-h-screen">
                <header class="p-6 bg-white">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <img src="https://placehold.co/80x80/cccccc/000000?text=JD" alt="Promoter Avatar" id="preview-avatar"
                                class="w-20 h-20 rounded-full object-cover shadow-md">
                            <div class="ml-4">
                                <h1 class="text-3xl font-bold revelti-blue" id="preview-name">John Doe</h1>
                                <p class="text-gray-500" id="preview-bio">Event Promoter</p>
                            </div>
                        </div>
                    </div>
                    <!-- Action Buttons -->
                    <div class="mt-6 flex flex-col space-y-3">
                        <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2">
                            <button
                                class="flex-1 flex items-center justify-center bg-revelti-orange text-white font-bold py-2 px-4 rounded-lg shadow-md hover:bg-orange-600 transition duration-300">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                                </svg>
                                Follow promoter
                            </button>
                            <button
                                class="flex-1 flex items-center justify-center bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg hover:bg-gray-300 transition duration-300">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5h12M9 3v2m4.05 16.95l-1.414-1.414M18.364 5.636l-1.414 1.414M21 12h-2M16 12a4 4 0 11-8 0 4 4 0 018 0zM12 19v2M5.636 18.364l1.414-1.414M4 12H2m14-7l1.414-1.414"></path>
                                </svg>
                                Translate
                            </button>
                        </div>
                        <button class="w-full flex items-center justify-center bg-white border-2 border-gray-200 text-gray-700 font-bold py-2 px-4 rounded-lg hover:bg-gray-50 transition duration-300 group">
                            <svg class="w-5 h-5 mr-2 text-gray-400 group-hover:text-yellow-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                            <span>Set as Default Promoter</span>
                        </button>
                    </div>
                </header>
            </div>

            <!-- Right Column: Tabbed Content -->
            <div class="lg:col-span-2">
                <!-- Tab Navigation -->
                <nav class="py-2 border-b border-gray-100">
                    <div class="flex px-4 space-x-2">
                        <button class="px-4 py-2 text-center text-revelti-blue bg-gray-100 rounded-full transition-all duration-200 text-sm font-bold">Events</button>
                        <button class="px-4 py-2 text-center text-gray-500 hover:bg-gray-200 rounded-full transition-all duration-200 text-sm font-medium">Collaborators</button>
                    </div>
                </nav>

                <main class="p-6 lg:bg-white lg:py-8 lg:px-6 space-y-6">
                    <!-- Highlighted Events -->
                    <details open>
                        <summary class="flex justify-between items-center cursor-pointer mb-3 outline-none">
                            <h2 class="text-xl font-bold revelti-blue">Highlighted</h2>
                        </summary>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <!-- Event Card 1 -->
                            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                <div class="relative">
                                    <img src="images/eventPoster.png" alt="Event Poster" class="w-full h-32 object-cover" onerror="this.onerror=null;this.src='https://placehold.co/600x400/cccccc/ffffff?text=Event';">
                                </div>
                                <div class="p-3">
                                    <h4 class="font-bold text-sm revelti-blue truncate">Dance Fest Spain 2026</h4>
                                    <p class="text-xs text-gray-500 mb-2">Oct 08-12, 2026 | Madrid</p>
                                    <div class="flex items-center mt-2">
                                        <span class="text-xs font-semibold text-gray-600 mr-2">Code:</span>
                                        <button class="inline-flex items-center bg-gray-100 hover:bg-gray-200 text-revelti-blue text-xs font-bold py-1 px-2.5 rounded transition duration-200">
                                            <span class="code-text mr-1">JOHNDOE26</span>
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </details>
                </main>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('message', function(event) {
            if (event.data.type === 'updateProfile') {
                if (event.data.field === 'name') {
                    document.getElementById('preview-name').textContent = event.data.value || 'John Doe';
                } else if (event.data.field === 'bio') {
                    document.getElementById('preview-bio').textContent = event.data.value || 'Event Promoter';
                }
            }
        });
    </script>
</body>
</html>
